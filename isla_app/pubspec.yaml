name: isla_app
description: ISLA - Intelligent Study and Learning Assistant

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # State management
  provider: ^6.1.1
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local persistence
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.4
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # File import
  file_picker: ^8.1.2

  # Networking
  dio: ^5.7.0
  http: ^1.2.0

  # Local key-value store
  hive_flutter: ^1.1.0

  # UI motion and charts
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.5
  google_sign_in: ^6.3.0

  # Date & Calendar
  table_calendar: ^3.0.9
  intl: ^0.18.1

  # Utils
  percent_indicator: ^4.2.3
  flip_card: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.21.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
